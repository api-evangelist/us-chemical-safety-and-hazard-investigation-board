description: >-
  The US Chemical Safety and Hazard Investigation Board (CSB) is an independent federal
  agency that is responsible for investigating chemical accidents and hazards across
  the United States. The board conducts thorough investigations into incidents involving
  the release of hazardous chemicals, explosions, fires, and other accidents that
  pose a threat to public safety and the environment.
