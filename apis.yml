aid: us-chemical-safety-and-hazard-investigation-board
name: US Chemical Safety and Hazard Investigation Board
description: >-
  The US Chemical Safety and Hazard Investigation Board (CSB) is an independent
  federal agency responsible for investigating chemical accidents and hazards across
  the United States. The board conducts thorough investigations into incidents involving
  the release of hazardous chemicals, explosions, fires, and other accidents that pose
  a threat to public safety and the environment. The CSB publishes investigation reports,
  safety recommendations, and incident data, and maintains a public database of completed
  investigations and safety recommendations. While no formal public API is available,
  the CSB makes incident data available through its website and periodic compiled reports
  under its Accidental Release Reporting Rule transparency initiative.
